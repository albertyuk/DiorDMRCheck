# Deploy (run from this directory):
#   fly apps create <your-app-name>        # app names are GLOBAL — pick something unique
#   sed -i '' 's/^app = .*/app = "<your-app-name>"/' fly.toml   # or edit the line below by hand
#   fly volumes create data --region sin --size 1 -a <your-app-name>
#   fly secrets set TIKHUB_API_KEY=... ANTHROPIC_API_KEY=... APP_PASSWORD=... -a <your-app-name>
#   fly deploy -a <your-app-name>
app = "dmr-reconciler"
primary_region = "sin"

# SINGLE PROCESS, SINGLE MACHINE — a hard constraint, not a tuning choice.
# Pending header-remap audits and finished efficiency reports live in
# process memory (app.core.token_store.TokenStore): a second machine or
# uvicorn worker would 404 the /remap/{token} and /efficiency/{token}
# redirects, and a restart drops them (by design for the efficiency product:
# client workbooks are never written to disk, so there is nothing to
# restore). Do not raise machine counts or add --workers without moving
# those stores to a shared backing first — which for the efficiency store
# would break its documented never-touches-disk privacy contract.

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "data"
  destination = "/data"
