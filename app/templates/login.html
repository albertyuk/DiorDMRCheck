{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:420px;margin:4rem auto">
  <h1>Sign in</h1>
  <p class="muted">This instance handles client campaign data and is
     password-protected.</p>
  {% if error %}<div class="warn">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <p><input type="password" name="password" placeholder="Password" required
              style="width:100%"></p>
    <button type="submit">Sign in</button>
  </form>
</div>
{% endblock %}
