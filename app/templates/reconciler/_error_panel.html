<div class="card"><h2>{{ t("Run failed") }}</h2>
  <p>{{ td(run.message) }}</p>
  <form method="post" action="/runs/{{ run_id }}/start" data-busy>
    {# preserve the options the user originally chose #}
    <input type="hidden" name="retry_failed_links"
           value="{{ '1' if options.get('retry_failed_links') else '0' }}">
    <input type="hidden" name="use_llm"
           value="{{ '1' if options.get('use_llm') else '0' }}">
    <button type="submit">{{ t("Retry run") }}</button>
  </form>
</div>
